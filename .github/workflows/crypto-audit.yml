name: Crypto Audit

on:
  schedule:
    # Every Sunday at UTC 06:00
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: crypto-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Clone collector repo
        run: git clone --depth 1 https://x-access-token:${{ secrets.K_LINE_COLLECTOR_PAT }}@github.com/sheng9571/k-line-collector.git

      - name: Run audit
        run: |
          mkdir -p /tmp/audit-output

          docker run --rm \
            -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -e AUDIT_OUTPUT_DIR=/tmp/audit-output \
            -v /tmp/audit-output:/tmp/audit-output \
            -v ${{ github.workspace }}/k-line-collector/common:/app/common:ro \
            -v ${{ github.workspace }}/k-line-collector/crypto:/app/crypto:ro \
            ghcr.io/${{ github.repository_owner }}/k-line-collector:latest \
            crypto audit

      - name: Copy reports into repo
        run: |
          rm -rf reports/crypto
          if [ -d /tmp/audit-output/reports/crypto ]; then
            mkdir -p reports
            cp -r /tmp/audit-output/reports/crypto reports/
          fi
          if [ -f /tmp/audit-output/REPORTS.md ]; then
            cp /tmp/audit-output/REPORTS.md REPORTS.md
          fi

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ REPORTS.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "audit: update crypto k-line gap reports [skip ci]"
            git push
          fi
