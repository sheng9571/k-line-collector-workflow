            -v /tmp/collector-output:/tmp \
            ghcr.io/${{ github.repository_owner }}/k-line-collector:latest \
            crypto backfill \
            --symbols "BTCUSDT,ETHUSDT,BNBUSDT,XRPUSDT,SOLUSDT" \
            --deadline-minutes 315

      - name: Check remaining symbols
        if: always()
        run: |
          if [ -f /tmp/collector-output/remaining_symbols.txt ]; then
            REMAINING=$(cat /tmp/collector-output/remaining_symbols.txt)
            if [ -n "$REMAINING" ]; then
              echo "::warning::Remaining symbols for batch-1: $REMAINING"
            fi
          fi

  batch-2:
