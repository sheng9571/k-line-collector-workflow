name: Crypto Backfill

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Comma-separated symbols (leave empty to run default batches)'
        required: false
        default: ''
      batch:
        description: 'Batch to run: 1-10, or "all" (ignored when symbols is set)'
        required: false
        default: 'all'

concurrency:
  group: crypto-backfill
  cancel-in-progress: false

jobs:
  # Custom symbols job: runs only when symbols input is provided
  custom:
    if: inputs.symbols != ''
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Clone collector repo
        run: git clone --depth 1 https://x-access-token:${{ secrets.K_LINE_COLLECTOR_PAT }}@github.com/sheng9571/k-line-collector.git

      - name: Run backfill
        run: |
          mkdir -p /tmp/collector-output

          docker run --rm \
            -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -e REMAINING_FILE=/tmp/remaining_symbols.txt \
            -v /tmp/collector-output:/tmp \
            -v ${{ github.workspace }}/k-line-collector/common:/app/common:ro \
            -v ${{ github.workspace }}/k-line-collector/crypto:/app/crypto:ro \
            ghcr.io/${{ github.repository_owner }}/k-line-collector:latest \
            crypto backfill \
            --symbols "${{ inputs.symbols }}" \
            --deadline-minutes 315

      - name: Check remaining symbols
        if: always()
        run: |
          if [ -f /tmp/collector-output/remaining_symbols.txt ]; then
            REMAINING=$(cat /tmp/collector-output/remaining_symbols.txt)
            if [ -n "$REMAINING" ]; then
              echo "::warning::Remaining symbols: $REMAINING"
            fi
          fi

  # Default batch jobs: run only when symbols input is empty
  batch-1:
    if: inputs.symbols == '' && (inputs.batch == 'all' || inputs.batch == '1')
