name: Forex Test Linux - MT5 IPC via Wine

on:
  workflow_dispatch:

jobs:
  test-mt5-wine:
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    env:
      DISPLAY: ":99"
      WINEPREFIX: "/home/runner/.mt5"
      WINEARCH: "win64"
      WINEDEBUG: "-all"
      DEBIAN_FRONTEND: "noninteractive"
      NEEDRESTART_MODE: "a"
      PYTHON_VERSION: "3.12.10"

    steps:
      # ============================================================
      # 1. Runner information
      # ============================================================

      - name: Show runner information
        run: |
          set -euxo pipefail

          cat /etc/os-release
          uname -a

          echo "HOME=$HOME"
          echo "DISPLAY=$DISPLAY"
          echo "WINEPREFIX=$WINEPREFIX"
          echo "WINEARCH=$WINEARCH"

      # ============================================================
      # 2. Install Linux utilities
      # ============================================================

      - name: Install Xvfb and utilities
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y --no-install-recommends \
            xvfb \
            x11-utils \
            xdotool \
            imagemagick \
            procps \
            psmisc \
            wget \
            curl \
            ca-certificates \
            gnupg \
            file \
            xxd

          command -v Xvfb
          command -v xdpyinfo
          command -v xdotool
          command -v import
          command -v curl
          command -v wget

      # ============================================================
      # 3. Start Xvfb
      # ============================================================

      - name: Start and verify Xvfb
        run: |
          set -euxo pipefail

          mkdir -p /tmp/screenshots

          RUNNER_TRACKING_ID="" \
          nohup Xvfb "$DISPLAY" \
            -screen 0 1280x1024x24 \
            -nolisten tcp \
            -ac \
            >/tmp/xvfb.log 2>&1 &

          echo $! >/tmp/xvfb.pid

          sleep 3

          XVFB_PID="$(cat /tmp/xvfb.pid)"

          if ! kill -0 "$XVFB_PID" 2>/dev/null; then
            echo "::error::Xvfb exited unexpectedly"
            cat /tmp/xvfb.log || true
            exit 1
          fi

          xdpyinfo \
            -display "$DISPLAY" \
            >/tmp/xdpyinfo.log

          echo "=== Xvfb display information ==="

          grep -E \
            'name of display|dimensions|depth of root window' \
            /tmp/xdpyinfo.log || true

          import \
            -display "$DISPLAY" \
            -window root \
            /tmp/screenshots/00000-xvfb-test.png

          test -s /tmp/screenshots/00000-xvfb-test.png

          file /tmp/screenshots/00000-xvfb-test.png

          touch /tmp/xvfb-ok

          echo "Xvfb is working on $DISPLAY"

      # ============================================================
      # 4. Start background screenshots
      # ============================================================

      - name: Start background screenshots
        if: always()
        run: |
          set -euxo pipefail

          mkdir -p /tmp/screenshots

          cat >/tmp/screenshot-loop.sh <<'SCRIPT'
          #!/usr/bin/env bash

          set +e

          INDEX=1
          MAX=1000

          while [ "$INDEX" -le "$MAX" ]; do
            TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
            FILENAME="$(printf '%05d-%s.png' "$INDEX" "$TIMESTAMP")"

            import \
              -display "${DISPLAY:-:99}" \
              -window root \
              "/tmp/screenshots/$FILENAME" \
              2>>/tmp/screenshot-errors.log

            INDEX=$((INDEX + 1))
            sleep 2
          done
          SCRIPT

          chmod +x /tmp/screenshot-loop.sh

          RUNNER_TRACKING_ID="" \
          nohup /tmp/screenshot-loop.sh \
            >/tmp/screenshot-stdout.log 2>&1 &

          echo $! >/tmp/screenshot.pid

          sleep 4

          SCREENSHOT_PID="$(cat /tmp/screenshot.pid)"

          if kill -0 "$SCREENSHOT_PID" 2>/dev/null; then
            echo "Screenshot loop is running with PID $SCREENSHOT_PID"
          else
            echo "::warning::Screenshot loop exited unexpectedly"
            cat /tmp/screenshot-stdout.log || true
            cat /tmp/screenshot-errors.log || true
          fi

      # ============================================================
      # 5. Download official MT5 Linux script
      #
      # Used to obtain the installer URLs supplied by MetaQuotes.
      # ============================================================

      - name: Download official MT5 Linux script
        run: |
          set -euxo pipefail

          curl \
            --fail \
            --location \
            --retry 3 \
            --connect-timeout 30 \
            "https://download.terminal.free/cdn/web/metaquotes.software.corp/mt5/mt5linux.sh" \
            --output /tmp/mt5linux.sh

          chmod +x /tmp/mt5linux.sh

          test -s /tmp/mt5linux.sh

          sha256sum /tmp/mt5linux.sh \
            >/tmp/mt5linux-sha256.txt

          echo "=== Relevant official script lines ==="

          grep -nE \
            'URL_MT5|URL_WEBVIEW|WINE_VERSION|winehq|WINEPREFIX|winecfg|webview2|mt5setup' \
            /tmp/mt5linux.sh || true

      # ============================================================
      # 6. Install WineHQ staging
      # ============================================================

      - name: Install WineHQ staging
        run: |
          set -euxo pipefail

          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings

          curl \
            --fail \
            --location \
            --retry 3 \
            "https://dl.winehq.org/wine-builds/winehq.key" |
            sudo gpg \
              --dearmor \
              --yes \
              --output /etc/apt/keyrings/winehq-archive.key

          sudo wget \
            -NP /etc/apt/sources.list.d/ \
            "https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources"

          sudo apt-get update

          sudo apt-get install -y --install-recommends \
            winehq-staging

          echo "=== Wine commands ==="

          command -v wine
          command -v wineboot
          command -v winecfg
          command -v wineserver
          command -v winepath

          echo "=== Wine version ==="

          wine --version |
            tee /tmp/wine-version.txt

          touch /tmp/wine-installed-ok

      # ============================================================
      # 7. Initialize Wine prefix
      #
      # The override prevents interactive Mono and Gecko prompts.
      # ============================================================

      - name: Initialize clean Wine prefix
        env:
          WINEDLLOVERRIDES: "mscoree,mshtml="
        run: |
          set -euxo pipefail

          wineserver -k || true
          sleep 2

          rm -rf "$WINEPREFIX"
          mkdir -p "$WINEPREFIX"

          set +e

          timeout \
            --signal=TERM \
            --kill-after=20s \
            180s \
            wineboot --init \
            > >(tee /tmp/wineboot.log) \
            2> >(tee /tmp/wineboot-error.log >&2)

          WINEBOOT_EXIT=$?

          set -e

          echo "$WINEBOOT_EXIT" \
            >/tmp/wineboot-exit-code

          echo "wineboot exit code: $WINEBOOT_EXIT"

          sleep 10

          test -f "$WINEPREFIX/system.reg"
          test -f "$WINEPREFIX/user.reg"
          test -d "$WINEPREFIX/drive_c/windows/system32"

          timeout \
            --signal=TERM \
            --kill-after=15s \
            60s \
            winecfg -v=win11 \
            > >(tee /tmp/winecfg.log) \
            2> >(tee /tmp/winecfg-error.log >&2) ||
            true

          sleep 5

          timeout \
            --signal=TERM \
            --kill-after=15s \
            60s \
            wine cmd /c ver \
            > >(tee /tmp/wine-cmd.log) \
            2> >(tee /tmp/wine-cmd-error.log >&2)

          touch /tmp/wine-prefix-ok

      # ============================================================
      # 8. Download WebView2 and MT5
      # ============================================================

      - name: Download WebView2 and MT5 installers
        run: |
          set -euxo pipefail

          WEBVIEW_URL="$(
            sed -n \
              's/^URL_WEBVIEW="\([^"]*\)".*/\1/p' \
              /tmp/mt5linux.sh |
              head -1
          )"

          MT5_URL="$(
            sed -n \
              's/^URL_MT5="\([^"]*\)".*/\1/p' \
              /tmp/mt5linux.sh |
              head -1
          )"

          if [ -z "$WEBVIEW_URL" ]; then
            echo "::error::Unable to read WebView2 URL"
            exit 1
          fi

          if [ -z "$MT5_URL" ]; then
            echo "::error::Unable to read MT5 URL"
            exit 1
          fi

          printf '%s\n' "$WEBVIEW_URL" \
            >/tmp/webview-url.txt

          printf '%s\n' "$MT5_URL" \
            >/tmp/mt5-url.txt

          curl \
            --fail \
            --location \
            --retry 3 \
            --connect-timeout 30 \
            "$WEBVIEW_URL" \
            --output /tmp/webview2.exe

          curl \
            --fail \
            --location \
            --retry 3 \
            --connect-timeout 30 \
            "$MT5_URL" \
            --output /tmp/mt5setup.exe

          test -s /tmp/webview2.exe
          test -s /tmp/mt5setup.exe

          if [ "$(xxd -l 2 -p /tmp/webview2.exe)" != "4d5a" ]; then
            echo "::error::WebView2 installer is not a PE file"
            exit 1
          fi

          if [ "$(xxd -l 2 -p /tmp/mt5setup.exe)" != "4d5a" ]; then
            echo "::error::MT5 installer is not a PE file"
            exit 1
          fi

          ls -lh \
            /tmp/webview2.exe \
            /tmp/mt5setup.exe

      # ============================================================
      # 9. Install WebView2
      # ============================================================

      - name: Install WebView2
        continue-on-error: true
        run: |
          set +e

          timeout \
            --signal=TERM \
            --kill-after=30s \
            420s \
            wine /tmp/webview2.exe /silent /install \
            > >(tee /tmp/webview2-install.log) \
            2> >(tee /tmp/webview2-install-error.log >&2)

          WEBVIEW_EXIT=$?

          echo "$WEBVIEW_EXIT" \
            >/tmp/webview2-exit-code

          echo "WebView2 exit code: $WEBVIEW_EXIT"

          sleep 15

          import \
            -display "$DISPLAY" \
            -window root \
            /tmp/screenshots/90001-after-webview2.png \
            2>>/tmp/screenshot-errors.log ||
            true

          exit 0

      # ============================================================
      # 10. Install MT5
      # ============================================================

      - name: Install MT5
        continue-on-error: true
        run: |
          set +e

          timeout \
            --signal=TERM \
            --kill-after=30s \
            600s \
            wine /tmp/mt5setup.exe /auto \
            > >(tee /tmp/mt5-install.log) \
            2> >(tee /tmp/mt5-install-error.log >&2)

          MT5_INSTALL_EXIT=$?

          echo "$MT5_INSTALL_EXIT" \
            >/tmp/mt5-install-exit-code

          echo "MT5 installer exit code: $MT5_INSTALL_EXIT"

          sleep 20

          import \
            -display "$DISPLAY" \
            -window root \
            /tmp/screenshots/90002-after-mt5-install.png \
            2>>/tmp/screenshot-errors.log ||
            true

          exit 0

      # ============================================================
      # 11. Find terminal64.exe
      # ============================================================

      - name: Find installed MT5 terminal
        if: always()
        run: |
          set +e

          TERMINAL="$(
            find "$WINEPREFIX/drive_c" \
              -type f \
              -iname 'terminal64.exe' \
              -print \
              -quit \
              2>/dev/null
          )"

          if [ -z "$TERMINAL" ]; then
            echo "::warning::terminal64.exe was not found"
            echo "not-found" >/tmp/mt5-terminal-status

            find "$WINEPREFIX/drive_c" \
              -type f \
              -iname '*.exe' \
              2>/dev/null |
              head -300 \
              >/tmp/wine-prefix-executables.txt ||
              true

            exit 0
          fi

          printf '%s\n' \
            "$TERMINAL" \
            >/tmp/mt5-terminal-path

          TERMINAL_WINDOWS_PATH="$(
            winepath -w "$TERMINAL" 2>/dev/null
          )"

          printf '%s\n' \
            "$TERMINAL_WINDOWS_PATH" \
            >/tmp/mt5-terminal-windows-path

          echo "Linux path: $TERMINAL"
          echo "Windows path: $TERMINAL_WINDOWS_PATH"

          echo "found" >/tmp/mt5-terminal-status

      # ============================================================
      # 12. Install Windows Python
      # ============================================================

      - name: Install Windows Python
        if: always()
        continue-on-error: true
        run: |
          set +e

          PYTHON_INSTALLER="python-${PYTHON_VERSION}-amd64.exe"

          PYTHON_URL="https://www.python.org/ftp/python/${PYTHON_VERSION}/${PYTHON_INSTALLER}"

          echo "Downloading Windows Python:"
          echo "$PYTHON_URL"

          curl \
            --fail \
            --location \
            --retry 3 \
            --connect-timeout 30 \
            "$PYTHON_URL" \
            --output "/tmp/${PYTHON_INSTALLER}"

          DOWNLOAD_EXIT=$?

          if [ "$DOWNLOAD_EXIT" -ne 0 ]; then
            echo "::error::Unable to download Windows Python"
            exit 0
          fi

          if [ "$(xxd -l 2 -p "/tmp/${PYTHON_INSTALLER}")" != "4d5a" ]; then
            echo "::error::Python installer is not a PE file"
            exit 0
          fi

          timeout \
            --signal=TERM \
            --kill-after=30s \
            420s \
            wine "/tmp/${PYTHON_INSTALLER}" \
              /quiet \
              InstallAllUsers=0 \
              Include_launcher=0 \
              Include_test=0 \
              PrependPath=1 \
            > >(tee /tmp/python-install.log) \
            2> >(tee /tmp/python-install-error.log >&2)

          PYTHON_INSTALL_EXIT=$?

          echo "$PYTHON_INSTALL_EXIT" \
            >/tmp/python-install-exit-code

          echo "Python installer exit code: $PYTHON_INSTALL_EXIT"

          sleep 10

          WINE_PYTHON="$(
            find "$WINEPREFIX/drive_c" \
              -type f \
              -iname python.exe \
              -path '*Python312*' \
              -print \
              -quit \
              2>/dev/null
          )"

          if [ -z "$WINE_PYTHON" ]; then
            WINE_PYTHON="$(
              find "$WINEPREFIX/drive_c" \
                -type f \
                -iname python.exe \
                -print \
                -quit \
                2>/dev/null
            )"
          fi

          if [ -z "$WINE_PYTHON" ]; then
            echo "::error::Windows Python was not found"

            find "$WINEPREFIX/drive_c" \
              -type f \
              -iname 'python*.exe' \
              2>/dev/null \
              >/tmp/python-executables.txt ||
              true

            exit 0
          fi

          printf '%s\n' \
            "$WINE_PYTHON" \
            >/tmp/wine-python-path

          echo "Windows Python: $WINE_PYTHON"

          wine "$WINE_PYTHON" --version \
            > >(tee /tmp/python-version.log) \
            2> >(tee /tmp/python-version-error.log >&2)

          if [ "${PIPESTATUS[0]}" -eq 0 ]; then
            touch /tmp/wine-python-ok
          fi

          exit 0

      # ============================================================
      # 13. Install MetaTrader5 Python package
      # ============================================================

      - name: Install MetaTrader5 Python package
        if: always()
        continue-on-error: true
        run: |
          set +e

          if [ ! -s /tmp/wine-python-path ]; then
            echo "::error::Windows Python path is unavailable"
            exit 0
          fi

          WINE_PYTHON="$(cat /tmp/wine-python-path)"

          wine "$WINE_PYTHON" \
            -m ensurepip --upgrade \
            > >(tee /tmp/python-ensurepip.log) \
            2> >(tee /tmp/python-ensurepip-error.log >&2)

          wine "$WINE_PYTHON" \
            -m pip install --upgrade pip \
            > >(tee /tmp/pip-upgrade.log) \
            2> >(tee /tmp/pip-upgrade-error.log >&2)

          wine "$WINE_PYTHON" \
            -m pip install MetaTrader5 \
            > >(tee /tmp/metatrader5-pip-install.log) \
            2> >(tee /tmp/metatrader5-pip-install-error.log >&2)

          PIP_EXIT=$?

          echo "$PIP_EXIT" \
            >/tmp/metatrader5-pip-install-exit-code

          wine "$WINE_PYTHON" \
            -c "import MetaTrader5 as mt5; print('MetaTrader5 package version:', mt5.__version__)" \
            > >(tee /tmp/metatrader5-import.log) \
            2> >(tee /tmp/metatrader5-import-error.log >&2)

          IMPORT_EXIT=$?

          echo "$IMPORT_EXIT" \
            >/tmp/metatrader5-import-exit-code

          if [ "$PIP_EXIT" -eq 0 ] && [ "$IMPORT_EXIT" -eq 0 ]; then
            touch /tmp/mt5-python-package-ok
          fi

          exit 0

      # ============================================================
      # 14. Start MT5 without account login
      # ============================================================

      - name: Start MT5 without login
        if: always()
        continue-on-error: true
        run: |
          set +e

          if [ ! -s /tmp/mt5-terminal-path ]; then
            echo "::warning::MT5 terminal path is unavailable"
            echo "not-started" >/tmp/mt5-launch-status
            exit 0
          fi

          TERMINAL="$(cat /tmp/mt5-terminal-path)"

          echo "Starting MT5:"
          echo "$TERMINAL"

          RUNNER_TRACKING_ID="" \
          nohup wine "$TERMINAL" \
            >/tmp/mt5-terminal.log 2>&1 &

          INITIAL_PID=$!

          echo "$INITIAL_PID" >/tmp/mt5-initial.pid
          echo "Initial Wine process PID: $INITIAL_PID"

          # Allow MT5 to finish first-run initialization and LiveUpdate.
          sleep 45

          echo "=== Visible X11 windows before dialog handling ==="

          xdotool search \
            --onlyvisible \
            --name '.*' \
            getwindowname %@ \
            >/tmp/x11-window-names-before.txt \
            2>/tmp/xdotool-window-errors-before.log || true

          cat /tmp/x11-window-names-before.txt || true

          import \
            -display "$DISPLAY" \
            -window root \
            /tmp/screenshots/99980-before-dialog-handling.png \
            2>>/tmp/screenshot-errors.log || true

          # ----------------------------------------------------------
          # Handle MT5 LiveUpdate restart prompt
          # ----------------------------------------------------------
          #
          # In the observed LiveUpdate dialog, the Restart button is
          # focused by default. Pressing Enter accepts the restart.
          #
          # Because xdotool cannot inspect button text, only send Enter
          # when the active window appears to belong to MT5.
          # ----------------------------------------------------------

          ACTIVE_WINDOW="$(
            xdotool getactivewindow 2>/dev/null || true
          )"

          if [ -n "$ACTIVE_WINDOW" ]; then
            ACTIVE_NAME="$(
              xdotool getwindowname "$ACTIVE_WINDOW" 2>/dev/null || true
            )"

            echo "Active window before LiveUpdate handling:"
            echo "$ACTIVE_NAME"

            if echo "$ACTIVE_NAME" | grep -Eqi \
              'MetaTrader|LiveUpdate|Update|terminal'
            then
              echo "Sending Enter to the active MT5 window..."

              xdotool windowactivate \
                --sync \
                "$ACTIVE_WINDOW" \
                2>/dev/null || true

              sleep 1

              xdotool key \
                --window "$ACTIVE_WINDOW" \
                Return \
                2>/tmp/xdotool-liveupdate-enter-error.log || true
            else
              echo "Active window does not look like MT5; skipping Enter."
            fi
          else
            echo "::warning::Unable to determine the active X11 window"
          fi

          # Give MT5 time to close and relaunch after LiveUpdate.
          sleep 10

          echo "Waiting for MT5 process after LiveUpdate..."

          MT5_RUNNING=0

          for ATTEMPT in $(seq 1 90); do
            MT5_PID="$(
              pgrep -f 'terminal64.exe' |
              head -1
            )"

            if [ -n "$MT5_PID" ]; then
              echo "MT5 process detected after update: PID $MT5_PID"
              MT5_RUNNING=1
              break
            fi

            echo "Waiting for MT5 restart... attempt $ATTEMPT/90"
            sleep 2
          done

          # Some MT5 updates close the original process but do not relaunch
          # successfully under Wine. If no process exists, launch it again.
          if [ "$MT5_RUNNING" -ne 1 ]; then
            echo "::warning::MT5 did not automatically restart"
            echo "Starting MT5 again manually..."

            RUNNER_TRACKING_ID="" \
            nohup wine "$TERMINAL" \
              >>/tmp/mt5-terminal.log 2>&1 &

            echo $! >/tmp/mt5-relaunch.pid

            sleep 30
          else
            # Allow the restarted terminal UI to become stable.
            sleep 25
          fi

          echo "=== Visible X11 windows after LiveUpdate handling ==="

          xdotool search \
            --onlyvisible \
            --name '.*' \
            getwindowname %@ \
            >/tmp/x11-window-names-after-update.txt \
            2>/tmp/xdotool-window-errors-after-update.log || true

          cat /tmp/x11-window-names-after-update.txt || true

          import \
            -display "$DISPLAY" \
            -window root \
            /tmp/screenshots/99981-after-liveupdate.png \
            2>>/tmp/screenshot-errors.log || true

          # ----------------------------------------------------------
          # Close the first-run company/account wizard
          # ----------------------------------------------------------
          #
          # Do not press Enter here because it may select "Next".
          # Escape closes the wizard without creating or logging into
          # an account.
          # ----------------------------------------------------------

          echo "Closing first-run account/company wizard if present..."

          for ATTEMPT in $(seq 1 3); do
            ACTIVE_WINDOW="$(
              xdotool getactivewindow 2>/dev/null || true
            )"

            if [ -z "$ACTIVE_WINDOW" ]; then
              echo "No active window found on attempt $ATTEMPT"
              break
            fi

            ACTIVE_NAME="$(
              xdotool getwindowname "$ACTIVE_WINDOW" 2>/dev/null || true
            )"

            echo "Active window before Escape $ATTEMPT:"
            echo "$ACTIVE_NAME"

            if echo "$ACTIVE_NAME" | grep -Eqi \
              'MetaTrader|terminal'
            then
              xdotool windowactivate \
                --sync \
                "$ACTIVE_WINDOW" \
                2>/dev/null || true

              sleep 1

              xdotool key \
                --window "$ACTIVE_WINDOW" \
                Escape \
                2>>/tmp/xdotool-wizard-escape-error.log || true

              sleep 3
            else
              echo "Active window does not look like MT5; stopping Escape loop."
              break
            fi
          done

          sleep 10

          echo "=== Final visible X11 windows ==="

          xdotool search \
            --onlyvisible \
            --name '.*' \
            getwindowname %@ \
            >/tmp/x11-window-names-final.txt \
            2>/tmp/xdotool-window-errors-final.log || true

          cat /tmp/x11-window-names-final.txt || true

          echo "=== MT5 and Wine processes ==="

          pgrep -af \
            'terminal64.exe|terminal.exe|MetaTrader|metatrader|wine|wineserver' \
            >/tmp/mt5-processes.log || true

          cat /tmp/mt5-processes.log || true

          MT5_PID="$(
            pgrep -f 'terminal64.exe' |
            head -1
          )"

          if [ -n "$MT5_PID" ]; then
            echo "MT5 is running with PID $MT5_PID"

            echo "$MT5_PID" >/tmp/mt5-running.pid
            echo "running" >/tmp/mt5-launch-status

            touch /tmp/mt5-opened-ok
          else
            echo "::warning::terminal64.exe process was not found"
            echo "not-running" >/tmp/mt5-launch-status
          fi

          import \
            -display "$DISPLAY" \
            -window root \
            /tmp/screenshots/99982-mt5-ready-for-ipc.png \
            2>>/tmp/screenshot-errors.log || true

          # Do not fail here. IPC testing and artifact upload must continue.
          exit 0

      # ============================================================
      # 15. Test Python ↔ MT5 IPC without login
      # ============================================================

      - name: Test MT5 Python IPC without login
        if: always()
        continue-on-error: true
        run: |
          set +e

          if [ ! -s /tmp/wine-python-path ]; then
            echo "::error::Windows Python path is unavailable"
            exit 0
          fi

          if [ ! -s /tmp/mt5-terminal-windows-path ]; then
            echo "::error::MT5 Windows terminal path is unavailable"
            exit 0
          fi

          WINE_PYTHON="$(cat /tmp/wine-python-path)"

          MT5_TERMINAL_WINDOWS="$(
            cat /tmp/mt5-terminal-windows-path
          )"

          cat >/tmp/test_mt5_ipc.py <<'PYTHON'
          import os
          import sys
          import time

          import MetaTrader5 as mt5


          terminal_path = os.environ["MT5_TERMINAL_WINDOWS"]

          print("MetaTrader5 package version:", mt5.__version__)
          print("Terminal path:", terminal_path)

          initialized = False

          for attempt in range(1, 4):
              print(f"IPC attempt {attempt}/3")

              mt5.shutdown()

              initialized = mt5.initialize(
                  path=terminal_path,
                  timeout=120_000,
                  portable=False,
              )

              print("initialize:", initialized)
              print("last_error:", mt5.last_error())

              if initialized:
                  break

              time.sleep(10)

          if not initialized:
              print("ERROR: mt5.initialize() failed")
              sys.exit(1)

          try:
              version = mt5.version()
              terminal = mt5.terminal_info()
              account = mt5.account_info()

              print("version:", version)
              print("terminal_info:", terminal)
              print("account_info:", account)

              if version is None:
                  print("ERROR: mt5.version() returned None")
                  sys.exit(1)

              if terminal is None:
                  print("ERROR: mt5.terminal_info() returned None")
                  sys.exit(1)

              print("terminal.name:", terminal.name)
              print("terminal.build:", terminal.build)
              print("terminal.connected:", terminal.connected)
              print("terminal.trade_allowed:", terminal.trade_allowed)

              if account is None:
                  print("No trading account is logged in, as expected.")
              else:
                  print("An account is already present:", account.login)

              print("MT5 Python IPC test passed.")

          finally:
              mt5.shutdown()
          PYTHON

          TEST_SCRIPT_WINDOWS="$(
            winepath -w /tmp/test_mt5_ipc.py
          )"

          echo "Test script Windows path:"
          echo "$TEST_SCRIPT_WINDOWS"

          MT5_TERMINAL_WINDOWS="$MT5_TERMINAL_WINDOWS" \
          timeout \
            --signal=TERM \
            --kill-after=30s \
            240s \
            wine "$WINE_PYTHON" "$TEST_SCRIPT_WINDOWS" \
            > >(tee /tmp/mt5-ipc-test.log) \
            2> >(tee /tmp/mt5-ipc-test-error.log >&2)

          IPC_EXIT=$?

          echo "$IPC_EXIT" \
            >/tmp/mt5-ipc-test-exit-code

          echo "MT5 IPC exit code: $IPC_EXIT"

          if [ "$IPC_EXIT" -eq 0 ]; then
            touch /tmp/mt5-ipc-ok
          fi

          import \
            -display "$DISPLAY" \
            -window root \
            /tmp/screenshots/99991-mt5-after-ipc.png \
            2>>/tmp/screenshot-errors.log ||
            true

          sleep 10

          import \
            -display "$DISPLAY" \
            -window root \
            /tmp/screenshots/99992-mt5-final.png \
            2>>/tmp/screenshot-errors.log ||
            true

          exit 0

      # ============================================================
      # 16. Collect diagnostics
      # ============================================================

      - name: Collect diagnostics
        if: always()
        run: |
          set +e

          echo "============================================================"
          echo "Status"
          echo "============================================================"

          echo -n "Xvfb: "
          if [ -f /tmp/xvfb-ok ]; then
            echo "OK"
          else
            echo "FAILED"
          fi

          echo -n "Wine installed: "
          if [ -f /tmp/wine-installed-ok ]; then
            echo "OK"
          else
            echo "FAILED"
          fi

          echo -n "Wine prefix: "
          if [ -f /tmp/wine-prefix-ok ]; then
            echo "OK"
          else
            echo "FAILED"
          fi

          echo -n "MT5 terminal: "
          cat /tmp/mt5-terminal-status 2>/dev/null ||
            echo "unknown"

          echo -n "MT5 launch: "
          cat /tmp/mt5-launch-status 2>/dev/null ||
            echo "unknown"

          echo -n "Windows Python: "
          if [ -f /tmp/wine-python-ok ]; then
            echo "OK"
          else
            echo "FAILED"
          fi

          echo -n "MetaTrader5 package: "
          if [ -f /tmp/mt5-python-package-ok ]; then
            echo "OK"
          else
            echo "FAILED"
          fi

          echo -n "Python IPC: "
          if [ -f /tmp/mt5-ipc-ok ]; then
            echo "OK"
          else
            echo "FAILED"
          fi

          echo "============================================================"
          echo "Exit codes"
          echo "============================================================"

          for FILE in \
            /tmp/wineboot-exit-code \
            /tmp/webview2-exit-code \
            /tmp/mt5-install-exit-code \
            /tmp/python-install-exit-code \
            /tmp/metatrader5-pip-install-exit-code \
            /tmp/metatrader5-import-exit-code \
            /tmp/mt5-ipc-test-exit-code
          do
            echo "$(basename "$FILE"): $(cat "$FILE" 2>/dev/null || echo unknown)"
          done

          echo "============================================================"
          echo "Processes"
          echo "============================================================"

          pgrep -af \
            'Xvfb|terminal64.exe|terminal.exe|MetaTrader|metatrader|wine|wineserver|webview|msedge|python.exe' ||
            true

          echo "============================================================"
          echo "Screenshot count"
          echo "============================================================"

          SCREENSHOT_COUNT="$(
            find /tmp/screenshots \
              -maxdepth 1 \
              -type f \
              -name '*.png' \
              2>/dev/null |
              wc -l
          )"

          echo "$SCREENSHOT_COUNT" |
            tee /tmp/screenshot-count

          echo "============================================================"
          echo "Latest screenshots"
          echo "============================================================"

          find /tmp/screenshots \
            -maxdepth 1 \
            -type f \
            -name '*.png' \
            -printf '%TY-%Tm-%Td %TH:%TM:%TS %f\n' \
            2>/dev/null |
            sort |
            tail -30 ||
            true

          echo "============================================================"
          echo "MT5 IPC log"
          echo "============================================================"

          cat /tmp/mt5-ipc-test.log 2>/dev/null ||
            true

          cat /tmp/mt5-ipc-test-error.log 2>/dev/null ||
            true

          echo "============================================================"
          echo "MT5 terminal log"
          echo "============================================================"

          tail -300 /tmp/mt5-terminal.log 2>/dev/null ||
            true

          echo "============================================================"
          echo "Screenshot errors"
          echo "============================================================"

          tail -200 /tmp/screenshot-errors.log 2>/dev/null ||
            true

          if [ -f /tmp/screenshot.pid ]; then
            kill "$(cat /tmp/screenshot.pid)" 2>/dev/null ||
              true
          fi

          sleep 3

      # ============================================================
      # 17. Upload screenshots and logs regardless of result
      # ============================================================

      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mt5-wine-ipc-diagnostics
          path: |
            /tmp/screenshots/
            /tmp/mt5linux.sh
            /tmp/mt5linux-sha256.txt
            /tmp/wine-version.txt
            /tmp/xvfb.log
            /tmp/xdpyinfo.log
            /tmp/screenshot-stdout.log
            /tmp/screenshot-errors.log
            /tmp/screenshot-count
            /tmp/wineboot.log
            /tmp/wineboot-error.log
            /tmp/wineboot-exit-code
            /tmp/winecfg.log
            /tmp/winecfg-error.log
            /tmp/wine-cmd.log
            /tmp/wine-cmd-error.log
            /tmp/webview2-install.log
            /tmp/webview2-install-error.log
            /tmp/webview2-exit-code
            /tmp/mt5-install.log
            /tmp/mt5-install-error.log
            /tmp/mt5-install-exit-code
            /tmp/mt5-terminal-path
            /tmp/mt5-terminal-windows-path
            /tmp/mt5-terminal-status
            /tmp/mt5-terminal.log
            /tmp/mt5-processes.log
            /tmp/mt5-launch-status
            /tmp/x11-window-names.txt
            /tmp/xdotool-window-errors.log
            /tmp/xdotool-escape-error.log
            /tmp/python-install.log
            /tmp/python-install-error.log
            /tmp/python-install-exit-code
            /tmp/python-version.log
            /tmp/python-version-error.log
            /tmp/wine-python-path
            /tmp/python-ensurepip.log
            /tmp/python-ensurepip-error.log
            /tmp/pip-upgrade.log
            /tmp/pip-upgrade-error.log
            /tmp/metatrader5-pip-install.log
            /tmp/metatrader5-pip-install-error.log
            /tmp/metatrader5-pip-install-exit-code
            /tmp/metatrader5-import.log
            /tmp/metatrader5-import-error.log
            /tmp/metatrader5-import-exit-code
            /tmp/test_mt5_ipc.py
            /tmp/mt5-ipc-test.log
            /tmp/mt5-ipc-test-error.log
            /tmp/mt5-ipc-test-exit-code
            /tmp/wine-prefix-executables.txt
            /tmp/python-executables.txt
            /tmp/x11-window-names-before.txt
            /tmp/x11-window-names-after-update.txt
            /tmp/x11-window-names-final.txt
            /tmp/xdotool-window-errors-before.log
            /tmp/xdotool-window-errors-after-update.log
            /tmp/xdotool-window-errors-final.log
            /tmp/xdotool-liveupdate-enter-error.log
            /tmp/xdotool-wizard-escape-error.log
            /tmp/mt5-relaunch.pid
          if-no-files-found: warn
          retention-days: 3

      # ============================================================
      # 18. Mark final result only after artifact upload
      # ============================================================

      - name: Final test result
        if: always()
        run: |
          set -uo pipefail

          FAILED=0

          if [ ! -f /tmp/xvfb-ok ]; then
            echo "::error::Xvfb verification failed"
            FAILED=1
          fi

          if [ ! -f /tmp/wine-installed-ok ]; then
            echo "::error::WineHQ staging installation failed"
            FAILED=1
          fi

          if [ ! -f /tmp/wine-prefix-ok ]; then
            echo "::error::Wine prefix initialization failed"
            FAILED=1
          fi

          if [ ! -s /tmp/mt5-terminal-path ]; then
            echo "::error::terminal64.exe was not found"
            FAILED=1
          fi

          if [ ! -f /tmp/mt5-opened-ok ]; then
            echo "::error::MT5 did not remain running"
            FAILED=1
          fi

          if [ ! -f /tmp/wine-python-ok ]; then
            echo "::error::Windows Python installation failed"
            FAILED=1
          fi

          if [ ! -f /tmp/mt5-python-package-ok ]; then
            echo "::error::MetaTrader5 Python package installation failed"
            FAILED=1
          fi

          if [ ! -f /tmp/mt5-ipc-ok ]; then
            echo "::error::MT5 Python IPC test failed"
            FAILED=1
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo
            echo "MT5 Wine IPC test failed."
            echo "Screenshots and logs were uploaded as:"
            echo "mt5-wine-ipc-diagnostics"
            exit 1
          fi

          echo
          echo "Xvfb: OK"
          echo "Wine prefix: OK"
          echo "MT5 installation: OK"
          echo "MT5 launch: OK"
          echo "Windows Python: OK"
          echo "MetaTrader5 package: OK"
          echo "Python to MT5 IPC: OK"
          echo "No account login was required."
