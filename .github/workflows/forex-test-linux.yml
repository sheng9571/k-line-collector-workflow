name: Forex Test Linux (MT5 via Wine)

on:
  workflow_dispatch:

jobs:
  test-mt5-wine:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install Wine and Xvfb
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            wine64 wine32 \
            xvfb \
            winbind \
            imagemagick \
            cabextract

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2
          echo "Virtual display started on :99"

      - name: Start background screenshots
        run: |
          mkdir -p /tmp/screenshots
          cat > /tmp/screenshot-loop.sh << 'SCRIPT'
          #!/bin/bash
          INDEX=0
          MAX=180
          while [ $INDEX -lt $MAX ]; do
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            FILENAME=$(printf "%05d-%s.png" $INDEX "$TIMESTAMP")
            import -window root "/tmp/screenshots/$FILENAME" 2>/tmp/screenshot-errors.log || true
            INDEX=$((INDEX + 1))
            sleep 2
          done
          SCRIPT
          chmod +x /tmp/screenshot-loop.sh

          # Prevent runner from killing this background process
          RUNNER_TRACKING_ID= nohup /tmp/screenshot-loop.sh > /tmp/screenshot-stdout.log 2>&1 &
          echo $! > /tmp/screenshot.pid

          echo "SCREENSHOT_DIR=/tmp/screenshots" >> $GITHUB_ENV
          echo "SCREENSHOT_PID_FILE=/tmp/screenshot.pid" >> $GITHUB_ENV

          sleep 3

          # Verify at least one screenshot was taken
          COUNT=$(ls /tmp/screenshots/*.png 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "Screenshot capture verified: $COUNT file(s)"
            ls -la /tmp/screenshots/ | head -5
          else
            echo "::warning::No screenshots produced yet. Checking errors..."
            cat /tmp/screenshot-errors.log 2>/dev/null || true
            echo "::warning::Screenshots may not work. Continuing."
          fi

      - name: Download MT5 installer
        run: |
          wget -q "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" \
            -O /tmp/mt5setup.exe

          # Verify it's a PE file
          MAGIC=$(xxd -l 2 -p /tmp/mt5setup.exe)
          if [ "$MAGIC" != "4d5a" ]; then
            echo "::error::Downloaded file is not a valid PE executable"
            exit 1
          fi

          ls -la /tmp/mt5setup.exe

      - name: Install MT5 via Wine
        env:
          DISPLAY: ':99'
        run: |
          echo "Installing MT5 via Wine..."

          # Run installer in silent mode
          timeout 300 wine /tmp/mt5setup.exe /auto || true

          # Wait for installation to settle
          sleep 15

          # Search for terminal64.exe
          echo "Searching for terminal64.exe..."
          TERMINAL=$(find ~/.wine -name "terminal64.exe" 2>/dev/null | head -1)

          if [ -z "$TERMINAL" ]; then
            echo "::warning::terminal64.exe not found in Wine prefix"
            echo "Wine drive_c contents:"
            find ~/.wine/drive_c -maxdepth 3 -type d 2>/dev/null | head -30
          else
            echo "MT5 found: $TERMINAL"
            echo "MT5_TERMINAL_PATH=$TERMINAL" >> $GITHUB_ENV
          fi

      - name: Start MT5 Terminal
        if: env.MT5_TERMINAL_PATH != ''
        env:
          DISPLAY: ':99'
        run: |
          echo "Starting MT5 Terminal: $MT5_TERMINAL_PATH"

          wine "$MT5_TERMINAL_PATH" &
          MT5_PID=$!
          echo "MT5 PID: $MT5_PID"

          # Wait for it to settle
          sleep 20

          # Check if still running
          if kill -0 $MT5_PID 2>/dev/null; then
            echo "MT5 Terminal is running (PID: $MT5_PID)"
          else
            echo "::warning::MT5 Terminal exited"
            echo "Wine processes:"
            ps aux | grep -i wine || true
          fi

      - name: Install Windows Python in Wine
        if: env.MT5_TERMINAL_PATH != ''
        env:
          DISPLAY: ':99'
        run: |
          echo "Downloading Windows Python 3.12..."
          wget -q "https://www.python.org/ftp/python/3.12.4/python-3.12.4-amd64.exe" \
            -O /tmp/python-installer.exe

          echo "Installing Python in Wine (silent)..."
          wine /tmp/python-installer.exe /quiet InstallAllUsers=1 PrependPath=1 || true

          sleep 10

          # Verify
          WINE_PYTHON=$(find ~/.wine -name "python.exe" -path "*/Python312/*" 2>/dev/null | head -1)

          if [ -z "$WINE_PYTHON" ]; then
            WINE_PYTHON=$(find ~/.wine -name "python.exe" 2>/dev/null | head -1)
          fi

          if [ -n "$WINE_PYTHON" ]; then
            echo "Wine Python found: $WINE_PYTHON"
            echo "WINE_PYTHON=$WINE_PYTHON" >> $GITHUB_ENV
            wine "$WINE_PYTHON" --version
          else
            echo "::error::Python not found in Wine prefix"
            find ~/.wine -name "python*" 2>/dev/null
            exit 1
          fi

      - name: Install MetaTrader5 pip package in Wine
        if: env.WINE_PYTHON != ''
        env:
          DISPLAY: ':99'
        run: |
          echo "Installing MetaTrader5 package..."
          wine "$WINE_PYTHON" -m pip install --upgrade pip
          wine "$WINE_PYTHON" -m pip install MetaTrader5

      - name: Test MT5 IPC
        if: env.WINE_PYTHON != '' && env.MT5_TERMINAL_PATH != ''
        env:
          DISPLAY: ':99'
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          cat > /tmp/test_mt5.py << 'PYTHON'
          import os
          import sys
          import time

          import MetaTrader5 as mt5

          terminal_path = os.environ.get("MT5_TERMINAL_PATH", "")
          login = int(os.environ["MT5_LOGIN"])
          password = os.environ["MT5_PASSWORD"]
          server = os.environ["MT5_SERVER"]

          print(f"MetaTrader5 package version: {mt5.__version__}")
          print(f"Terminal path: {terminal_path}")
          print(f"Server: {server}")
          print(f"Login: {login}")

          initialized = False

          for attempt in range(1, 4):
              print(f"IPC attempt {attempt}/3...")
              mt5.shutdown()

              kwargs = {"timeout": 120000}
              if terminal_path:
                  kwargs["path"] = terminal_path

              initialized = mt5.initialize(**kwargs)

              if initialized:
                  print("IPC succeeded!")
                  break

              print(f"Failed: {mt5.last_error()}")
              time.sleep(10)

          if not initialized:
              print(f"Final error: {mt5.last_error()}")
              sys.exit(1)

          try:
              info = mt5.terminal_info()
              if info:
                  print(f"Terminal: {info.name}, build: {info.build}")
                  print(f"Connected: {info.connected}")

              if not mt5.login(login=login, password=password, server=server, timeout=60000):
                  print(f"Login failed: {mt5.last_error()}")
                  sys.exit(1)

              account = mt5.account_info()
              if account:
                  print(f"Account: {account.login} @ {account.server}")

              print("Test complete.")
          finally:
              mt5.shutdown()
          PYTHON

          wine "$WINE_PYTHON" /tmp/test_mt5.py

      - name: Stop screenshots
        if: always()
        run: |
          if [ -f /tmp/screenshot.pid ]; then
            PID=$(cat /tmp/screenshot.pid)
            kill $PID 2>/dev/null || true
          fi

          sleep 2

          COUNT=$(ls /tmp/screenshots/*.png 2>/dev/null | wc -l)
          echo "Total screenshots captured: $COUNT"

          if [ -f /tmp/screenshot-stdout.log ]; then
            echo "=== screenshot stdout (last 20 lines) ==="
            tail -20 /tmp/screenshot-stdout.log
          fi

          if [ -f /tmp/screenshot-errors.log ]; then
            echo "=== screenshot errors ==="
            cat /tmp/screenshot-errors.log
          fi

      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mt5-linux-screenshots
          path: |
            /tmp/screenshots
            /tmp/screenshot-stdout.log
            /tmp/screenshot-errors.log
          if-no-files-found: warn
          retention-days: 3
