name: Crypto Daily Collection

on:
  schedule:
    # UTC 02:04 daily - after Binance daily data is finalized
    - cron: '4 2 * * *'
  workflow_dispatch:

concurrency:
  group: crypto-daily
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Run daily collection
        run: |
          docker run --rm \
            -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
            ghcr.io/${{ github.repository_owner }}/k-line-collector:latest \
            crypto daily
