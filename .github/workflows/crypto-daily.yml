name: Crypto Daily Collection

on:
  schedule:
    # UTC 02:04 daily - after Binance daily data is finalized
    - cron: '4 2 * * *'
  workflow_dispatch:

concurrency:
  group: crypto-daily
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Clone collector repo
        run: git clone --depth 1 https://x-access-token:${{ secrets.K_LINE_COLLECTOR_PAT }}@github.com/sheng9571/k-line-collector.git

      - name: Run daily collection
        run: |
          docker run --rm \
            -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -v ${{ github.workspace }}/k-line-collector/common:/app/common:ro \
            -v ${{ github.workspace }}/k-line-collector/crypto:/app/crypto:ro \
            ghcr.io/${{ github.repository_owner }}/k-line-collector:latest \
            crypto daily
