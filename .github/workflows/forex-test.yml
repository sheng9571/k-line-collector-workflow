name: Forex Test (MT5 + RustDesk)

on:
  workflow_dispatch:
    inputs:
      debug_remote:
        description: 'Remote desktop: none, rustdesk'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - rustdesk
      debug_timeout_minutes:
        description: 'Minutes to keep runner alive for remote access'
        required: false
        default: '30'

jobs:
  test-mt5:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      # --- RustDesk Remote Access (first, so you can observe everything) ---
      - name: Install RustDesk
        if: inputs.debug_remote == 'rustdesk'
        run: |
          $ErrorActionPreference = 'Stop'

          # Get latest RustDesk release URL
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/rustdesk/rustdesk/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "rustdesk-.*-x86_64\.exe" -and $_.name -notmatch "portable" } | Select-Object -First 1
          $downloadUrl = $asset.browser_download_url
          $version = $release.tag_name

          Write-Host "Downloading RustDesk $version..."
          Invoke-WebRequest -Uri $downloadUrl -OutFile "$env:TEMP\rustdesk.exe" -TimeoutSec 120
          Write-Host "Download complete."

          # Silent install
          Write-Host "Installing RustDesk silently..."
          Start-Process "$env:TEMP\rustdesk.exe" -ArgumentList "--silent-install" -Wait
          Start-Sleep -Seconds 20

          # Verify service is running
          $svc = Get-Service -Name "RustDesk" -ErrorAction SilentlyContinue
          if ($svc -eq $null) {
            Write-Host "Installing RustDesk service..."
            Start-Process "$env:ProgramFiles\RustDesk\rustdesk.exe" -ArgumentList "--install-service" -Wait
            Start-Sleep -Seconds 10
          }

          # Ensure service is running
          $timeout = 30
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            $svc = Get-Service -Name "RustDesk" -ErrorAction SilentlyContinue
            if ($svc -and $svc.Status -eq 'Running') {
              Write-Host "RustDesk service is running."
              break
            }
            Start-Service "RustDesk" -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 5
            $elapsed += 5
          }

      - name: Configure RustDesk and show connection info
        if: inputs.debug_remote == 'rustdesk'
        run: |
          $ErrorActionPreference = 'Stop'
          cd "$env:ProgramFiles\RustDesk"

          # Generate random password
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 12 | ForEach-Object { [char]$_ })

          # Set password
          .\rustdesk.exe --password $password
          Start-Sleep -Seconds 3

          # Get ID
          $id = (.\rustdesk.exe --get-id 2>&1) | Out-String
          $id = $id.Trim()

          Write-Host ""
          Write-Host "========================================================"
          Write-Host " RUSTDESK CONNECTION INFO"
          Write-Host "========================================================"
          Write-Host ""
          Write-Host " RustDesk ID: $id"
          Write-Host " Password:    $password"
          Write-Host ""
          Write-Host "========================================================"
          Write-Host " HOW TO CONNECT:"
          Write-Host ""
          Write-Host " 1. Download RustDesk: https://rustdesk.com/download"
          Write-Host " 2. Open RustDesk on your local machine"
          Write-Host " 3. Enter the ID above in the connection field"
          Write-Host " 4. Enter the password when prompted"
          Write-Host "========================================================"
          Write-Host ""
          Write-Host " Remote access will remain active until the workflow ends."
          Write-Host "========================================================"

      # --- Setup environment ---
      - name: Clone collector repo
        run: git clone --depth 1 https://x-access-token:${{ secrets.K_LINE_COLLECTOR_PAT }}@github.com/sheng9571/k-line-collector.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install MetaTrader5 pyarrow huggingface_hub pyyaml numpy

      # --- MT5 Install and Test ---
      - name: Download MT5 installer
        run: |
          $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"
          $output = "$env:TEMP\mt5setup.exe"
          Write-Host "Downloading MT5 installer..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 120
          Write-Host "Download complete: $output"

      - name: Install MT5 Terminal (silent)
        run: |
          $installer = "$env:TEMP\mt5setup.exe"
          Write-Host "Installing MT5 Terminal in silent mode..."
          Start-Process -FilePath $installer -ArgumentList "/auto" -Wait -NoNewWindow
          Write-Host "MT5 installation complete."

      - name: Wait for MT5 Terminal process
        run: |
          $timeout = 60
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            $proc = Get-Process -Name "terminal64" -ErrorAction SilentlyContinue
            if ($proc) {
              Write-Host "MT5 Terminal is running (PID: $($proc.Id))"
              break
            }
            Start-Sleep -Seconds 5
            $elapsed += 5
            Write-Host "Waiting for MT5 Terminal... ($elapsed/$timeout s)"
          }
          if (-not (Get-Process -Name "terminal64" -ErrorAction SilentlyContinue)) {
            Write-Host "::warning::MT5 Terminal process not detected after ${timeout}s"
          }

      - name: Test MT5 connection
        env:
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          python -c "
          import MetaTrader5 as mt5
          import os

          login = int(os.environ['MT5_LOGIN'])
          password = os.environ['MT5_PASSWORD']
          server = os.environ['MT5_SERVER']

          print(f'Connecting to {server} with login {login}...')
          result = mt5.initialize(login=login, password=password, server=server)
          if result:
              info = mt5.terminal_info()
              print(f'Connected successfully!')
              print(f'Terminal: {info.name}')
              print(f'Build: {info.build}')
              print(f'Server: {info.connected}')
              mt5.shutdown()
          else:
              code, msg = mt5.last_error()
              print(f'Connection FAILED: code={code}, msg={msg}')
              exit(1)
          "

      # --- Keep alive for remote debugging ---
      - name: Keep alive for remote debugging
        if: always() && inputs.debug_remote == 'rustdesk'
        run: |
          $minutes = [int]"${{ inputs.debug_timeout_minutes }}"
          Write-Host ""
          Write-Host "========================================================"
          Write-Host " ALL STEPS COMPLETE - KEEPING ALIVE FOR REMOTE DEBUG"
          Write-Host " Runner will shut down in $minutes minutes."
          Write-Host " RustDesk is still active. Connect now if needed."
          Write-Host "========================================================"
          Start-Sleep -Seconds ($minutes * 60)
          Write-Host "Debug timeout reached. Shutting down."
