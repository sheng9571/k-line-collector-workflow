name: Forex Test (MT5)

on:
  workflow_dispatch:

jobs:
  test-mt5:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Clone collector repo
        run: git clone --depth 1 https://x-access-token:${{ secrets.K_LINE_COLLECTOR_PAT }}@github.com/sheng9571/k-line-collector.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install MetaTrader5 pyarrow huggingface_hub pyyaml numpy

      - name: Download MT5 installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"
          $output = "$env:TEMP\mt5setup.exe"

          Write-Host "Downloading MT5 installer..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 120

          # Verify downloaded file is a valid PE executable
          $bytes = [System.IO.File]::ReadAllBytes($output)
          if ($bytes.Length -lt 2 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw "Downloaded file is not a valid Windows executable."
          }

          Get-Item $output | Format-List FullName, Length, LastWriteTime
          Get-FileHash $output -Algorithm SHA256

      - name: Install MT5 Terminal
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installer = "$env:TEMP\mt5setup.exe"

          Write-Host "Installing MT5 Terminal..."

          $process = Start-Process `
            -FilePath $installer `
            -ArgumentList "/auto" `
            -PassThru

          if (-not $process.WaitForExit(300000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "MT5 installer timed out after 300 seconds."
          }

          $exitCode = $process.ExitCode
          Write-Host "Installer exit code: $exitCode"

          # Give child processes/filesystem a moment to settle
          Start-Sleep -Seconds 10

          # Search for terminal64.exe
          $candidatePaths = @(
            "$env:ProgramFiles\MetaTrader 5\terminal64.exe",
            "$env:LOCALAPPDATA\Programs\MetaTrader 5\terminal64.exe"
          )

          $terminal = $candidatePaths |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if (-not $terminal) {
            $terminal = Get-ChildItem `
              -Path $env:ProgramFiles, "$env:LOCALAPPDATA\Programs" `
              -Filter terminal64.exe `
              -File `
              -Recurse `
              -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName -First 1
          }

          if ($terminal) {
            Write-Host "MT5 was installed successfully:"
            Write-Host $terminal

            "MT5_PATH=$terminal" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            if ($exitCode -ne 0) {
              Write-Host "::warning::Installer returned $exitCode, but terminal64.exe exists; continuing."
            }
          }
          else {
            Write-Host "::error::terminal64.exe was not found."
            Write-Host "Processes still related to setup:"
            Get-Process |
              Where-Object {
                $_.ProcessName -match 'mt5|meta|setup|terminal'
              } |
              Format-Table Id, ProcessName, SessionId, Path -AutoSize

            throw "MT5 installation failed with exit code $exitCode."
          }

      - name: Start MT5 Terminal
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not $env:MT5_PATH -or -not (Test-Path $env:MT5_PATH)) {
            throw "MT5_PATH is missing or invalid: $env:MT5_PATH"
          }

          Write-Host "Starting: $env:MT5_PATH"

          $process = Start-Process `
            -FilePath $env:MT5_PATH `
            -PassThru

          Write-Host "Initial PID: $($process.Id)"

          for ($i = 1; $i -le 18; $i++) {
            $terminal = Get-Process terminal64 -ErrorAction SilentlyContinue |
              Select-Object -First 1

            if ($terminal) {
              Write-Host "MT5 is running:"
              $terminal | Format-List Id, SessionId, Path, StartTime
              exit 0
            }

            if ($process.HasExited) {
              Write-Host "::warning::Initial MT5 process exited with code $($process.ExitCode)"
            }

            Start-Sleep -Seconds 5
          }

          throw "terminal64.exe did not stay running."

      - name: Test MT5 connection
        shell: pwsh
        env:
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          @'
          import os
          import sys
          import MetaTrader5 as mt5

          login = int(os.environ["MT5_LOGIN"])
          password = os.environ["MT5_PASSWORD"]
          server = os.environ["MT5_SERVER"]
          terminal_path = os.environ["MT5_PATH"]

          print(f"Terminal path: {terminal_path}")
          print(f"Connecting to {server} with login {login}...")

          result = mt5.initialize(
              path=terminal_path,
              login=login,
              password=password,
              server=server,
              timeout=60000,
          )

          if not result:
              code, message = mt5.last_error()
              print(f"MT5 initialize failed: code={code}, message={message}")
              sys.exit(1)

          try:
              terminal_info = mt5.terminal_info()
              account_info = mt5.account_info()

              print("Connected successfully.")
              print(f"Terminal connected: {terminal_info.connected}")
              print(f"Terminal build: {terminal_info.build}")
              print(f"Account login: {account_info.login}")
              print(f"Account server: {account_info.server}")

              rates = mt5.copy_rates_from_pos(
                  "EURUSD",
                  mt5.TIMEFRAME_M1,
                  0,
                  10,
              )

              if rates is None:
                  code, message = mt5.last_error()
                  raise RuntimeError(
                      f"copy_rates_from_pos failed: code={code}, message={message}"
                  )

              print(f"Received {len(rates)} EURUSD M1 bars.")

          finally:
              mt5.shutdown()
          '@ | Set-Content -Path "$env:TEMP\test_mt5.py" -Encoding UTF8

          python "$env:TEMP\test_mt5.py"
