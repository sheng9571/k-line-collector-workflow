name: Forex Test (MT5)

on:
  workflow_dispatch:

jobs:
  test-mt5:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Clone collector repo
        run: git clone --depth 1 https://x-access-token:${{ secrets.K_LINE_COLLECTOR_PAT }}@github.com/sheng9571/k-line-collector.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install MetaTrader5 pyarrow huggingface_hub pyyaml numpy

      - name: Download MT5 installer
        shell: pwsh
        run: |
          $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"
          $output = "$env:TEMP\mt5setup.exe"
          Write-Host "Downloading MT5 installer..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 120
          Write-Host "Download complete: $output"

      - name: Install MT5 Terminal
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installer = "$env:TEMP\mt5setup.exe"

          Write-Host "Installing MT5 Terminal..."

          $process = Start-Process `
            -FilePath $installer `
            -ArgumentList "/auto" `
            -PassThru

          $timeoutSeconds = 300

          if (-not $process.WaitForExit($timeoutSeconds * 1000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "MT5 installer did not finish within $timeoutSeconds seconds."
          }

          Write-Host "Installer exit code: $($process.ExitCode)"

          if ($process.ExitCode -ne 0) {
            throw "MT5 installer failed with exit code $($process.ExitCode)."
          }

      - name: Locate and start MT5 Terminal
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host "Searching for terminal64.exe..."

          $terminal = $null

          # Check common paths first
          $commonPaths = @(
            "$env:ProgramFiles\MetaTrader 5\terminal64.exe",
            "$env:LOCALAPPDATA\Programs\MetaTrader 5\terminal64.exe"
          )

          foreach ($path in $commonPaths) {
            if (Test-Path $path) {
              $terminal = Get-Item $path
              break
            }
          }

          # Fallback: search Program Files and LOCALAPPDATA
          if (-not $terminal) {
            $searchRoots = @(
              "$env:ProgramFiles",
              "${env:ProgramFiles(x86)}",
              "$env:LOCALAPPDATA\Programs",
              "C:\"
            ) | Where-Object { $_ -and (Test-Path $_) }

            foreach ($root in $searchRoots) {
              Write-Host "Searching under: $root"

              $terminal = Get-ChildItem `
                -Path $root `
                -Filter "terminal64.exe" `
                -File `
                -Recurse `
                -ErrorAction SilentlyContinue |
                Select-Object -First 1

              if ($terminal) {
                break
              }
            }
          }

          if (-not $terminal) {
            Write-Host ""
            Write-Host "Installed directories under Program Files:"
            Get-ChildItem "$env:ProgramFiles" -Directory -ErrorAction SilentlyContinue |
              Select-Object FullName
            throw "MT5 installation finished, but terminal64.exe was not found."
          }

          $terminalPath = $terminal.FullName
          Write-Host "MT5 terminal found: $terminalPath"

          # Save path for subsequent steps
          "MT5_PATH=$terminalPath" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Explicitly start MT5
          $proc = Start-Process -FilePath $terminalPath -PassThru
          Write-Host "Started MT5, initial PID: $($proc.Id)"

          # Wait up to 90 seconds for process to be running
          $running = $null
          for ($i = 1; $i -le 18; $i++) {
            $running = Get-Process -Name "terminal64" -ErrorAction SilentlyContinue |
              Select-Object -First 1

            if ($running) {
              Write-Host "MT5 Terminal is running."
              Write-Host "PID: $($running.Id)"
              Write-Host "Session: $($running.SessionId)"
              Write-Host "Path: $($running.Path)"
              break
            }

            Write-Host "Waiting for MT5 Terminal... attempt $i/18"
            Start-Sleep -Seconds 5
          }

          if (-not $running) {
            throw "terminal64.exe was started but no running MT5 process was detected."
          }

      - name: Test MT5 connection
        shell: pwsh
        env:
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          @'
          import os
          import sys
          import MetaTrader5 as mt5

          login = int(os.environ["MT5_LOGIN"])
          password = os.environ["MT5_PASSWORD"]
          server = os.environ["MT5_SERVER"]
          terminal_path = os.environ["MT5_PATH"]

          print(f"Terminal path: {terminal_path}")
          print(f"Connecting to {server} with login {login}...")

          result = mt5.initialize(
              path=terminal_path,
              login=login,
              password=password,
              server=server,
              timeout=60000,
          )

          if not result:
              code, message = mt5.last_error()
              print(f"MT5 initialize failed: code={code}, message={message}")
              sys.exit(1)

          try:
              terminal_info = mt5.terminal_info()
              account_info = mt5.account_info()

              print("Connected successfully.")
              print(f"Terminal connected: {terminal_info.connected}")
              print(f"Terminal build: {terminal_info.build}")
              print(f"Account login: {account_info.login}")
              print(f"Account server: {account_info.server}")

              rates = mt5.copy_rates_from_pos(
                  "EURUSD",
                  mt5.TIMEFRAME_M1,
                  0,
                  10,
              )

              if rates is None:
                  code, message = mt5.last_error()
                  raise RuntimeError(
                      f"copy_rates_from_pos failed: code={code}, message={message}"
                  )

              print(f"Received {len(rates)} EURUSD M1 bars.")

          finally:
              mt5.shutdown()
          '@ | Set-Content -Path "$env:TEMP\test_mt5.py" -Encoding UTF8

          python "$env:TEMP\test_mt5.py"
