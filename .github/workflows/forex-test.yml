name: Forex Test (MT5 + RDP)

on:
  workflow_dispatch:
    inputs:
      debug_rdp:
        description: 'RDP debug mode: none, cloudflare'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - cloudflare
      debug_timeout_minutes:
        description: 'Minutes to keep runner alive after MT5 steps (only when debug_rdp=cloudflare)'
        required: false
        default: '30'

jobs:
  test-mt5:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      # --- RDP Debug (background tunnel, stays alive until job ends) ---
      - name: Enable Remote Desktop
        if: inputs.debug_rdp == 'cloudflare'
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "Remote Desktop enabled."

      - name: Create RDP user
        if: inputs.debug_rdp == 'cloudflare'
        run: |
          $username = "dbg" + -join ((48..57) + (97..122) | Get-Random -Count 5 | ForEach-Object { [char]$_ })
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 16 | ForEach-Object { [char]$_ })

          net user $username $password /add /y
          net localgroup administrators $username /add

          echo "RDP_USER=$username" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Download cloudflared
        if: inputs.debug_rdp == 'cloudflare'
        run: |
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\cloudflared.exe" -TimeoutSec 60
          Write-Host "cloudflared downloaded."

      - name: Start Cloudflare Tunnel (background)
        if: inputs.debug_rdp == 'cloudflare'
        run: |
          # Start tunnel as background process - stays alive until job ends
          Start-Process -FilePath "$env:TEMP\cloudflared.exe" `
            -ArgumentList "tunnel --url rdp://localhost:3389" `
            -NoNewWindow -RedirectStandardError "$env:TEMP\cloudflared.log"

          # Wait for tunnel URL
          $timeout = 30
          $elapsed = 0
          $tunnelUrl = ""
          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 3
            $elapsed += 3
            if (Test-Path "$env:TEMP\cloudflared.log") {
              $log = Get-Content "$env:TEMP\cloudflared.log" -Raw
              if ($log -match "(https://[a-z0-9\-]+\.trycloudflare\.com)") {
                $tunnelUrl = $Matches[1]
                break
              }
            }
          }

          Write-Host ""
          Write-Host "========================================================"
          Write-Host " RDP CONNECTION INFO"
          Write-Host "========================================================"
          Write-Host ""
          if ($tunnelUrl) {
            Write-Host " Tunnel URL: $tunnelUrl"
          } else {
            Write-Host " WARNING: Tunnel URL not detected within ${timeout}s"
          }
          Write-Host ""
          Write-Host " Username: $env:RDP_USER"
          Write-Host " Password: $env:RDP_PASS"
          Write-Host ""
          Write-Host " CLIENT SETUP (one-time):"
          Write-Host "   winget install cloudflare.cloudflared"
          Write-Host ""
          Write-Host " CONNECT:"
          if ($tunnelUrl) {
            Write-Host "   cloudflared access rdp --hostname $tunnelUrl --url localhost:30678"
          } else {
            Write-Host "   cloudflared access rdp --hostname <TUNNEL_URL> --url localhost:30678"
          }
          Write-Host ""
          Write-Host " Then open Remote Desktop (mstsc.exe) -> localhost:30678"
          Write-Host "========================================================"
          Write-Host ""
          Write-Host " Tunnel is running in background. You can connect at any"
          Write-Host " time while the workflow is still running."
          Write-Host "========================================================"

          if (-not $tunnelUrl -and (Test-Path "$env:TEMP\cloudflared.log")) {
            Write-Host ""
            Write-Host "--- cloudflared log ---"
            Get-Content "$env:TEMP\cloudflared.log"
          }

      # --- Setup environment ---
      - name: Clone collector repo
        run: git clone --depth 1 https://x-access-token:${{ secrets.K_LINE_COLLECTOR_PAT }}@github.com/sheng9571/k-line-collector.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install MetaTrader5 pyarrow huggingface_hub pyyaml numpy

      # --- MT5 Install and Test ---
      - name: Download MT5 installer
        run: |
          $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"
          $output = "$env:TEMP\mt5setup.exe"
          Write-Host "Downloading MT5 installer..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 120
          Write-Host "Download complete: $output"

      - name: Install MT5 Terminal (silent)
        run: |
          $installer = "$env:TEMP\mt5setup.exe"
          Write-Host "Installing MT5 Terminal in silent mode..."
          Start-Process -FilePath $installer -ArgumentList "/auto" -Wait -NoNewWindow
          Write-Host "MT5 installation complete."

      - name: Wait for MT5 Terminal process
        run: |
          $timeout = 60
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            $proc = Get-Process -Name "terminal64" -ErrorAction SilentlyContinue
            if ($proc) {
              Write-Host "MT5 Terminal is running (PID: $($proc.Id))"
              break
            }
            Start-Sleep -Seconds 5
            $elapsed += 5
            Write-Host "Waiting for MT5 Terminal... ($elapsed/$timeout s)"
          }
          if (-not (Get-Process -Name "terminal64" -ErrorAction SilentlyContinue)) {
            Write-Host "::warning::MT5 Terminal process not detected after ${timeout}s"
          }

      - name: Test MT5 connection
        env:
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          python -c "
          import MetaTrader5 as mt5
          import os

          login = int(os.environ['MT5_LOGIN'])
          password = os.environ['MT5_PASSWORD']
          server = os.environ['MT5_SERVER']

          print(f'Connecting to {server} with login {login}...')
          result = mt5.initialize(login=login, password=password, server=server)
          if result:
              info = mt5.terminal_info()
              print(f'Connected successfully!')
              print(f'Terminal: {info.name}')
              print(f'Build: {info.build}')
              print(f'Server: {info.connected}')
              mt5.shutdown()
          else:
              code, msg = mt5.last_error()
              print(f'Connection FAILED: code={code}, msg={msg}')
              exit(1)
          "

      # --- Keep alive for RDP debugging (after all steps complete) ---
      - name: Keep alive for RDP debugging
        if: always() && inputs.debug_rdp == 'cloudflare'
        run: |
          $minutes = [int]"${{ inputs.debug_timeout_minutes }}"
          Write-Host ""
          Write-Host "========================================================"
          Write-Host " ALL STEPS COMPLETE - KEEPING ALIVE FOR RDP DEBUG"
          Write-Host " Runner will shut down in $minutes minutes."
          Write-Host " RDP tunnel is still active. Connect now if needed."
          Write-Host "========================================================"
          Start-Sleep -Seconds ($minutes * 60)
          Write-Host "Debug timeout reached. Shutting down."
