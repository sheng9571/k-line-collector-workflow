name: Forex Test (MT5)

on:
  workflow_dispatch:

jobs:
  test-mt5:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Clone collector repo
        run: git clone --depth 1 https://x-access-token:${{ secrets.K_LINE_COLLECTOR_PAT }}@github.com/sheng9571/k-line-collector.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install MetaTrader5 pyarrow huggingface_hub pyyaml numpy

      - name: Start desktop screenshots
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $screenshotDir = Join-Path $env:RUNNER_TEMP "desktop-screenshots"
          $scriptPath = Join-Path $env:RUNNER_TEMP "capture-desktop.ps1"
          $pidPath = Join-Path $env:RUNNER_TEMP "capture-desktop.pid"
          $stdoutPath = Join-Path $env:RUNNER_TEMP "capture-desktop.stdout.log"
          $stderrPath = Join-Path $env:RUNNER_TEMP "capture-desktop.stderr.log"

          New-Item -ItemType Directory -Path $screenshotDir -Force | Out-Null

          @'
          param(
            [Parameter(Mandatory = $true)]
            [string]$OutputDirectory
          )

          $ErrorActionPreference = "Continue"

          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing

          New-Item -ItemType Directory -Path $OutputDirectory -Force | Out-Null

          $index = 0

          while ($index -lt 180) {
            try {
              $screens = [System.Windows.Forms.Screen]::AllScreens

              if (-not $screens -or $screens.Count -eq 0) {
                throw "No screens were detected."
              }

              $left = ($screens | ForEach-Object { $_.Bounds.Left } | Measure-Object -Minimum).Minimum
              $top = ($screens | ForEach-Object { $_.Bounds.Top } | Measure-Object -Minimum).Minimum
              $right = ($screens | ForEach-Object { $_.Bounds.Right } | Measure-Object -Maximum).Maximum
              $bottom = ($screens | ForEach-Object { $_.Bounds.Bottom } | Measure-Object -Maximum).Maximum

              $width = $right - $left
              $height = $bottom - $top

              if ($width -le 0 -or $height -le 0) {
                throw "Invalid screen size: ${width}x${height}"
              }

              $timestamp = Get-Date -Format "yyyyMMdd-HHmmss-fff"
              $filename = "{0:D5}-{1}.png" -f $index, $timestamp
              $outputPath = Join-Path $OutputDirectory $filename

              $bitmap = New-Object System.Drawing.Bitmap $width, $height
              $graphics = [System.Drawing.Graphics]::FromImage($bitmap)

              try {
                $graphics.CopyFromScreen(
                  $left, $top, 0, 0,
                  [System.Drawing.Size]::new($width, $height)
                )
                $bitmap.Save($outputPath, [System.Drawing.Imaging.ImageFormat]::Png)
                Write-Output "Saved: $outputPath"
              }
              finally {
                $graphics.Dispose()
                $bitmap.Dispose()
              }
            }
            catch {
              [Console]::Error.WriteLine(
                "Screenshot failed at {0}: {1}" -f `
                  (Get-Date -Format "o"),
                  $_.Exception.ToString()
              )
            }

            $index++
            Start-Sleep -Seconds 2
          }
          '@ | Set-Content -Path $scriptPath -Encoding UTF8

          $originalTrackingId = $env:RUNNER_TRACKING_ID

          try {
            $env:RUNNER_TRACKING_ID = ""

            $process = Start-Process `
              -FilePath "pwsh.exe" `
              -ArgumentList @(
                "-NoLogo",
                "-NoProfile",
                "-ExecutionPolicy", "Bypass",
                "-File", "`"$scriptPath`"",
                "-OutputDirectory", "`"$screenshotDir`""
              ) `
              -WindowStyle Hidden `
              -RedirectStandardOutput $stdoutPath `
              -RedirectStandardError $stderrPath `
              -PassThru
          }
          finally {
            $env:RUNNER_TRACKING_ID = $originalTrackingId
          }

          $process.Id | Set-Content -Path $pidPath -Encoding ASCII

          "SCREENSHOT_DIR=$screenshotDir" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SCREENSHOT_PID_FILE=$pidPath" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SCREENSHOT_STDOUT=$stdoutPath" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SCREENSHOT_STDERR=$stderrPath" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Start-Sleep -Seconds 5

          $process.Refresh()

          if ($process.HasExited) {
            Write-Host "::warning::Screenshot process exited early (code: $($process.ExitCode))"
            if (Test-Path $stderrPath) {
              Write-Host "========== screenshot stderr =========="
              Get-Content $stderrPath
            }
            Write-Host "::warning::Desktop screenshots will not be available. Continuing workflow."
          }
          else {
            $firstScreenshot = Get-ChildItem `
              -Path $screenshotDir `
              -Filter "*.png" `
              -File `
              -ErrorAction SilentlyContinue |
              Select-Object -First 1

            if (-not $firstScreenshot) {
              Write-Host "::warning::No PNG produced in 5s."
              if (Test-Path $stderrPath) {
                Write-Host "========== screenshot stderr =========="
                Get-Content $stderrPath
              }
              Write-Host "::warning::Desktop screenshots may not work on this runner. Continuing."
            }
            else {
              Write-Host "Screenshot capture verified:"
              Get-Item $firstScreenshot.FullName |
                Format-List FullName, Length, LastWriteTime
            }
          }

      - name: Download MT5 installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"
          $output = "$env:TEMP\mt5setup.exe"

          Write-Host "Downloading MT5 installer..."
          Invoke-WebRequest -Uri $url -OutFile $output -TimeoutSec 120

          $bytes = [System.IO.File]::ReadAllBytes($output)
          if ($bytes.Length -lt 2 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw "Downloaded file is not a valid Windows executable."
          }

          Get-Item $output | Format-List FullName, Length, LastWriteTime
          Get-FileHash $output -Algorithm SHA256

      - name: Install MT5 Terminal
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installer = "$env:TEMP\mt5setup.exe"

          Write-Host "Installer:"
          Get-Item $installer | Format-List FullName, Length, LastWriteTime

          $process = Start-Process `
            -FilePath $installer `
            -ArgumentList "/auto" `
            -PassThru

          if (-not $process.WaitForExit(300000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "MT5 installer timed out after 300 seconds."
          }

          $exitCode = $process.ExitCode
          Write-Host "Installer exit code: $exitCode"

          Start-Sleep -Seconds 10

          $candidatePaths = @(
            "$env:ProgramFiles\MetaTrader 5\terminal64.exe",
            "$env:LOCALAPPDATA\Programs\MetaTrader 5\terminal64.exe"
          )

          $terminal = $candidatePaths |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if (-not $terminal) {
            $terminal = Get-ChildItem `
              -Path $env:ProgramFiles, "$env:LOCALAPPDATA\Programs" `
              -Filter terminal64.exe `
              -File `
              -Recurse `
              -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName -First 1
          }

          if ($terminal) {
            Write-Host "MT5 was installed successfully:"
            Write-Host $terminal

            "MT5_PATH=$terminal" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            if ($exitCode -ne 0) {
              Write-Host "::warning::Installer returned $exitCode, but terminal64.exe exists; continuing."
            }
          }
          else {
            Write-Host "::error::terminal64.exe was not found."
            Get-Process |
              Where-Object { $_.ProcessName -match 'mt5|meta|setup|terminal' } |
              Format-Table Id, ProcessName, SessionId, Path -AutoSize
            throw "MT5 installation failed with exit code $exitCode."
          }

      - name: Prepare portable MT5
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not $env:MT5_PATH -or -not (Test-Path $env:MT5_PATH)) {
            throw "MT5_PATH is missing or invalid: $env:MT5_PATH"
          }

          Get-Process terminal64 -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue

          Start-Sleep -Seconds 3

          $sourceDir = Split-Path $env:MT5_PATH -Parent
          $portableDir = Join-Path $env:RUNNER_TEMP "mt5-portable"
          $portableExe = Join-Path $portableDir "terminal64.exe"

          if (Test-Path $portableDir) {
            Remove-Item $portableDir -Recurse -Force
          }

          Write-Host "Copying MT5 from: $sourceDir"
          Write-Host "To: $portableDir"

          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          Copy-Item -Path "$sourceDir\*" -Destination $portableDir -Recurse -Force

          if (-not (Test-Path $portableExe)) {
            throw "Portable terminal was not created: $portableExe"
          }

          New-Item `
            -ItemType File `
            -Path (Join-Path $portableDir "portable") `
            -Force | Out-Null

          "MT5_PATH=$portableExe" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          "MT5_DATA_DIR=$portableDir" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Portable MT5 prepared: $portableExe"

      - name: Test MT5 IPC, login and K-line access
        shell: pwsh
        env:
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          @'
          import os
          import sys
          import time
          from pathlib import Path

          import MetaTrader5 as mt5

          terminal_path = Path(os.environ["MT5_PATH"])
          login = int(os.environ["MT5_LOGIN"])
          password = os.environ["MT5_PASSWORD"]
          server = os.environ["MT5_SERVER"]

          print(f"MetaTrader5 Python package: {mt5.__version__}")
          print(f"Terminal path: {terminal_path}")
          print(f"Terminal exists: {terminal_path.exists()}")
          print(f"Server: {server}")
          print(f"Login: {login}")

          if not terminal_path.exists():
              raise FileNotFoundError(terminal_path)

          initialized = False

          for attempt in range(1, 4):
              print(f"IPC initialization attempt {attempt}/3...")
              mt5.shutdown()

              initialized = mt5.initialize(
                  path=str(terminal_path),
                  timeout=120_000,
                  portable=True,
              )

              if initialized:
                  print("IPC initialization succeeded.")
                  break

              print(f"IPC initialization failed: {mt5.last_error()}")
              os.system('taskkill /F /IM terminal64.exe >NUL 2>&1')
              time.sleep(10)

          if not initialized:
              print(f"Final IPC error: {mt5.last_error()}")
              sys.exit(1)

          try:
              terminal_info = mt5.terminal_info()
              if terminal_info is None:
                  raise RuntimeError(f"terminal_info failed: {mt5.last_error()}")

              print("Terminal IPC information:")
              print(f"  name: {terminal_info.name}")
              print(f"  build: {terminal_info.build}")
              print(f"  path: {terminal_info.path}")
              print(f"  data_path: {terminal_info.data_path}")
              print(f"  connected: {terminal_info.connected}")

              print("Logging into trading account...")

              if not mt5.login(
                  login=login,
                  password=password,
                  server=server,
                  timeout=60_000,
              ):
                  raise RuntimeError(f"MT5 login failed: {mt5.last_error()}")

              account_info = mt5.account_info()
              if account_info is None:
                  raise RuntimeError(f"account_info failed: {mt5.last_error()}")

              print("Account login succeeded:")
              print(f"  login: {account_info.login}")
              print(f"  server: {account_info.server}")
              print(f"  company: {account_info.company}")

              symbols = mt5.symbols_get()
              if symbols is None:
                  raise RuntimeError(f"symbols_get failed: {mt5.last_error()}")

              symbol_names = [item.name for item in symbols]

              symbol = next(
                  (name for name in symbol_names if name.upper() == "EURUSD"),
                  None,
              )
              if symbol is None:
                  symbol = next(
                      (name for name in symbol_names if name.upper().startswith("EURUSD")),
                      None,
                  )
              if symbol is None:
                  sample = symbol_names[:30]
                  raise RuntimeError(
                      f"Could not find EURUSD-compatible symbol. First symbols: {sample}"
                  )

              print(f"Using symbol: {symbol}")

              if not mt5.symbol_select(symbol, True):
                  raise RuntimeError(f"symbol_select failed: {mt5.last_error()}")

              rates = mt5.copy_rates_from_pos(symbol, mt5.TIMEFRAME_M1, 0, 10)

              if rates is None:
                  raise RuntimeError(f"copy_rates_from_pos failed: {mt5.last_error()}")

              print(f"Received {len(rates)} bars.")
              for rate in rates[-3:]:
                  print(
                      f"time={rate['time']} open={rate['open']} "
                      f"high={rate['high']} low={rate['low']} close={rate['close']}"
                  )

          finally:
              mt5.shutdown()
          '@ | Set-Content -Path "$env:RUNNER_TEMP\test_mt5.py" -Encoding UTF8

          python "$env:RUNNER_TEMP\test_mt5.py"

          $pythonExitCode = $LASTEXITCODE

          if ($pythonExitCode -ne 0) {
            Write-Host ""
            Write-Host "========== MT5 process diagnostics =========="
            Get-Process terminal64 -ErrorAction SilentlyContinue |
              Format-List Id, SessionId, Path, StartTime, Responding

            Write-Host ""
            Write-Host "========== MT5 log files =========="
            $logFiles = Get-ChildItem `
              -Path $env:MT5_DATA_DIR `
              -Filter "*.log" `
              -File `
              -Recurse `
              -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 10

            foreach ($log in $logFiles) {
              Write-Host ""
              Write-Host "----- $($log.FullName) -----"
              Get-Content $log.FullName -Tail 100 -ErrorAction SilentlyContinue
            }

            exit $pythonExitCode
          }

      - name: Stop desktop screenshots
        if: always()
        shell: pwsh
        run: |
          if ($env:SCREENSHOT_PID_FILE -and (Test-Path $env:SCREENSHOT_PID_FILE)) {
            $capturePid = Get-Content $env:SCREENSHOT_PID_FILE | Select-Object -First 1
            if ($capturePid) {
              Write-Host "Stopping screenshot process PID: $capturePid"
              Stop-Process -Id ([int]$capturePid) -Force -ErrorAction SilentlyContinue
            }
          }

          Start-Sleep -Seconds 2

          if ($env:SCREENSHOT_DIR -and (Test-Path $env:SCREENSHOT_DIR)) {
            $files = Get-ChildItem -Path $env:SCREENSHOT_DIR -Filter "*.png" -File -ErrorAction SilentlyContinue
            Write-Host "Captured screenshots: $($files.Count)"
            $files | Sort-Object Name | Select-Object -First 5 | Format-Table Name, Length, LastWriteTime
          }

          if ($env:SCREENSHOT_STDOUT -and (Test-Path $env:SCREENSHOT_STDOUT)) {
            Write-Host ""
            Write-Host "========== screenshot stdout (last 50 lines) =========="
            Get-Content $env:SCREENSHOT_STDOUT -Tail 50
          }

          if ($env:SCREENSHOT_STDERR -and (Test-Path $env:SCREENSHOT_STDERR)) {
            Write-Host ""
            Write-Host "========== screenshot stderr =========="
            Get-Content $env:SCREENSHOT_STDERR -Tail 100
          }

      - name: Upload desktop diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mt5-desktop-diagnostics
          path: |
            ${{ runner.temp }}/desktop-screenshots
            ${{ runner.temp }}/capture-desktop.stdout.log
            ${{ runner.temp }}/capture-desktop.stderr.log
          if-no-files-found: warn
          retention-days: 3
